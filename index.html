<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LV Logistics — Global Route Network</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Header -->
  <div class="header-overlay">
    <img class="header-logo" src="assets/logo.png" alt="LV Logistics" onerror="this.style.display='none'">
    <div class="header-text">
      <h1>LV Logistics</h1>
      <p>Global Route Network — Caspian Corridor</p>
    </div>
  </div>

  <!-- Top Controls -->
  <div class="top-controls">
    <button onclick="zoomTo('global')">Global</button>
    <button onclick="zoomTo('europe')">Europe</button>
    <button onclick="zoomTo('centralasia')">Central Asia</button>
    <button onclick="zoomTo('asia')">East Asia</button>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn" title="Switch to light mode">☀️</button>
  </div>

  <!-- Legend Panel -->
  <div class="legend-panel">
    <div class="legend-title">Routes &amp; Services</div>

    <div class="legend-item" data-route="route1" onclick="toggleRoute('route1')">
      <div class="legend-line dashed" style="--clr: #a855f7;"></div>
      <span class="legend-label">LCL — USA via Rotterdam → CIS</span>
      <span class="legend-days">30-35d</span>
      <button class="legend-note-btn has-notes" onclick="event.stopPropagation(); showNotes('route1')" title="Route notes">📋</button>
    </div>

    <div class="legend-item" data-route="route2" onclick="toggleRoute('route2')">
      <div class="legend-line dashed" style="--clr: #ef4444;"></div>
      <span class="legend-label">LCL — China via Turkey → CIS</span>
      <span class="legend-days">35-40d</span>
      <button class="legend-note-btn has-notes" onclick="event.stopPropagation(); showNotes('route2')" title="Route notes">📋</button>
    </div>

    <div class="legend-item" data-route="route3" onclick="toggleRoute('route3')">
      <div class="legend-line dashed" style="--clr: #f59e0b;"></div>
      <span class="legend-label">Silkway — China via Kazakhstan</span>
      <span class="legend-days">28-30d</span>
      <button class="legend-note-btn has-notes" onclick="event.stopPropagation(); showNotes('route3')" title="Route notes">📋</button>
    </div>

    <div class="legend-item" data-route="route4" onclick="toggleRoute('route4')">
      <div class="legend-line dashed" style="--clr: #10b981;"></div>
      <span class="legend-label">LTL — EU via Turkey → CIS</span>
      <span class="legend-days">17-25d</span>
      <button class="legend-note-btn has-notes" onclick="event.stopPropagation(); showNotes('route4')" title="Route notes">📋</button>
    </div>

    <div class="legend-item" data-route="route5" onclick="toggleRoute('route5')">
      <div class="legend-line dashed" style="--clr: #38bdf8;"></div>
      <span class="legend-label">Alt — China via Cape of Good Hope</span>
      <span class="legend-days">45-55d</span>
      <button class="legend-note-btn has-notes" onclick="event.stopPropagation(); showNotes('route5')" title="Route notes">📋</button>
    </div>

    <div class="legend-section">
      <div class="legend-transport-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M2 20h20M4 20V8l4-4h8l4 4v12M8 20v-4h8v4M6 12h12"/>
        </svg>
        <span>Ocean / Sea</span>
      </div>
      <div class="legend-transport-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="1" y="6" width="18" height="10" rx="2"/>
          <path d="M19 9h2.5a1.5 1.5 0 011.5 1.5v4a1.5 1.5 0 01-1.5 1.5H19"/>
          <circle cx="6" cy="18" r="2"/><circle cx="16" cy="18" r="2"/>
        </svg>
        <span>Road</span>
      </div>
      <div class="legend-transport-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="4" y="4" width="16" height="12" rx="1"/>
          <path d="M2 16h20M8 20h8M6 16v4M18 16v4M9 8h6"/>
        </svg>
        <span>Rail</span>
      </div>
    </div>
  </div>

  <!-- Info Panel -->
  <div class="info-panel" id="infoPanel">
    <button class="info-panel-close" onclick="closeInfoPanel()">×</button>
    <div class="info-panel-title" id="infoPanelTitle"></div>
    <div class="info-panel-detail" id="infoPanelDetail"></div>
  </div>

  <!-- Notes Panel -->
  <div class="notes-panel" id="notesPanel">
    <div class="notes-panel-header">
      <div class="notes-panel-title" id="notesPanelTitle"></div>
      <button class="notes-panel-close" onclick="closeNotesPanel()">×</button>
    </div>
    <div id="notesPanelContent"></div>
  </div>

  <!-- Map Container -->
  <div id="map"></div>

  <!-- Application Scripts (ES Modules) -->
  <script type="module" src="js/app.js"></script>

</body>
</html>

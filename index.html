<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LV Logistics — Global Route Network</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Header -->
  <div class="header-overlay">
    <img class="header-logo" src="assets/logo.png" alt="LV Logistics" onerror="this.style.display='none'">
    <div class="header-text">
      <h1>LV Logistics</h1>
      <p>Global Route Network — Caspian Corridor</p>
    </div>
  </div>

  <!-- Top Controls -->
  <div class="top-controls">
    <button onclick="zoomTo('global')">Global</button>
    <button onclick="zoomTo('europe')">Europe</button>
    <button onclick="zoomTo('asia')">East Asia</button>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn" title="Switch to light mode">☀️</button>
  </div>

  <!-- Legend Panel -->
  <div class="legend-panel">
    <div class="legend-title">Routes &amp; Services</div>

    <div class="legend-item" data-route="route1" onclick="toggleRoute('route1')">
      <div class="legend-line dashed" style="--clr: #a855f7;"></div>
      <span class="legend-label">FCL/LCL — USA via Rotterdam → CIS</span>
      <span class="legend-days">30-35d</span>
      <button class="legend-note-btn has-notes" onclick="event.stopPropagation(); showNotes('route1')" title="Route notes">📋</button>
    </div>

    <div class="legend-item" data-route="route2" onclick="toggleRoute('route2')">
      <div class="legend-line dashed" style="--clr: #ef4444;"></div>
      <span class="legend-label">FCL/LCL — China via Turkey → CIS</span>
      <span class="legend-days">35-40d</span>
      <button class="legend-note-btn has-notes" onclick="event.stopPropagation(); showNotes('route2')" title="Route notes">📋</button>
    </div>

    <div class="legend-item" data-route="route3" onclick="toggleRoute('route3')">
      <div class="legend-line dashed" style="--clr: #f59e0b;"></div>
      <span class="legend-label">Silkway — China via Kazakhstan</span>
      <span class="legend-days">28-30d</span>
      <button class="legend-note-btn has-notes" onclick="event.stopPropagation(); showNotes('route3')" title="Route notes">📋</button>
    </div>

    <div class="legend-item" data-route="route4" onclick="toggleRoute('route4')">
      <div class="legend-line dashed" style="--clr: #10b981;"></div>
      <span class="legend-label">FTL/LTL — EU via Turkey → CIS</span>
      <span class="legend-days">17-25d</span>
      <button class="legend-note-btn has-notes" onclick="event.stopPropagation(); showNotes('route4')" title="Route notes">📋</button>
    </div>

    <div class="legend-item" data-route="route5" onclick="toggleRoute('route5')">
      <div class="legend-line dashed" style="--clr: #38bdf8;"></div>
      <span class="legend-label">Via Cape of Good Hope → CIS</span>
      <span class="legend-days">45-55d</span>
      <button class="legend-note-btn has-notes" onclick="event.stopPropagation(); showNotes('route5')" title="Route notes">📋</button>
    </div>

    <div class="legend-section">
      <div class="legend-transport-item">
        <span class="legend-transport-icon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 1.5a.75.75 0 0 1 .75.75V4.5h6.75a.75.75 0 0 1 .75.75v6.69l1.94 1.69a.75.75 0 0 1 .14.97l-2.86 4.45a3.75 3.75 0 0 1-3.13 1.7H6.66a3.75 3.75 0 0 1-3.13-1.7L.67 14.6a.75.75 0 0 1 .14-.97l1.94-1.69V5.25a.75.75 0 0 1 .75-.75h6.75V2.25a.75.75 0 0 1 .75-.75ZM5.25 6v5.25l6.75-1.69 6.75 1.69V6h-13.5Z"/></svg></span>
        <span>Ocean / Sea</span>
      </div>
      <div class="legend-transport-item">
        <span class="legend-transport-icon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M3.375 4.5C2.339 4.5 1.5 5.34 1.5 6.375V13.5h12V6.375c0-1.036-.84-1.875-1.875-1.875h-8.25ZM13.5 15h-12v2.625c0 1.035.84 1.875 1.875 1.875h.375a3 3 0 1 1 6 0h3a.75.75 0 0 0 .75-.75V15Z"/><path d="M8.25 19.5a1.5 1.5 0 1 0-3 0 1.5 1.5 0 0 0 3 0ZM15.75 6.75a.75.75 0 0 0-.75.75v11.25c0 .087.015.17.042.248a3 3 0 0 1 5.958.464c.853-.175 1.522-.935 1.464-1.883a18.659 18.659 0 0 0-3.732-10.104 1.837 1.837 0 0 0-1.47-.725H15.75Z"/><path d="M19.5 19.5a1.5 1.5 0 1 0-3 0 1.5 1.5 0 0 0 3 0Z"/></svg></span>
        <span>Road</span>
      </div>
      <div class="legend-transport-item">
        <span class="legend-transport-icon"><svg viewBox="0 0 24 24" fill="currentColor"><path fill-rule="evenodd" d="M12 2.25c-2.429 0-4.817.178-7.152.521C2.87 3.061 1.5 4.795 1.5 6.741V16.5a3 3 0 0 0 3 3h.879l-1.94 1.94a.75.75 0 1 0 1.061 1.06l3-3h7l3 3a.75.75 0 1 0 1.06-1.06l-1.939-1.94H19.5a3 3 0 0 0 3-3V6.741c0-1.946-1.37-3.68-3.348-3.97A49.149 49.149 0 0 0 12 2.25ZM4.5 9a.75.75 0 0 1 .75-.75h13.5a.75.75 0 0 1 .75.75v3.75a.75.75 0 0 1-.75.75H5.25a.75.75 0 0 1-.75-.75V9Zm3 6a1.125 1.125 0 1 1 2.25 0 1.125 1.125 0 0 1-2.25 0Zm6.75-1.125a1.125 1.125 0 1 0 0 2.25 1.125 1.125 0 0 0 0-2.25Z" clip-rule="evenodd"/></svg></span>
        <span>Rail</span>
      </div>
    </div>
  </div>

  <!-- Info Panel -->
  <div class="info-panel" id="infoPanel">
    <button class="info-panel-close" onclick="closeInfoPanel()">×</button>
    <div class="info-panel-title" id="infoPanelTitle"></div>
    <div class="info-panel-detail" id="infoPanelDetail"></div>
  </div>

  <!-- Notes Panel -->
  <div class="notes-panel" id="notesPanel">
    <div class="notes-panel-header">
      <div class="notes-panel-title" id="notesPanelTitle"></div>
      <button class="notes-panel-close" onclick="closeNotesPanel()">×</button>
    </div>
    <div id="notesPanelContent"></div>
  </div>

  <!-- Map Container -->
  <div id="map"></div>

  <!-- Single bundled script — no ES module imports needed -->
  <script src="js/bundle.js"></script>

</body>
</html>
